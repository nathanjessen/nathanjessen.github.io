version: '3.8'

services:
  jekyll:
    build: .
    ports:
      - "4000:4000"
      - "35729:35729"
    volumes:
      - .:/srv/jekyll
      - gem-cache:/home/app/.gems
    environment:
      - JEKYLL_ENV=development
    tty: true
    stdin_open: true
    restart: unless-stopped

volumes:
  gem-cache:
